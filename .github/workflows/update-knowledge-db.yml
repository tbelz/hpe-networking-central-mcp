name: Update Knowledge Database

on:
  schedule:
    - cron: "0 4 * * *"   # Daily at 04:00 UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write          # Needed for creating releases
  issues: write            # Needed for knowledge-sync alert issues

jobs:
  build-knowledge-db:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Prime VSG cache from previous release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The VSG host (arubanetworking.hpe.com) is fronted by an Akamai
          # WAF that blocks GitHub Actions runner IPs with HTTP 403.  Seed
          # the on-disk cache from the previous release so the VSG
          # provider's stale-cache fallback can serve last-good content
          # when today's fetch is blocked.
          mkdir -p build/spec_cache
          PREV=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            echo "No previous release — starting with empty VSG cache."
            exit 0
          fi
          gh release download "$PREV" --pattern vsg-cache.tar.gz --dir build 2>/dev/null || {
            echo "Previous release has no vsg-cache.tar.gz — starting empty."
            exit 0
          }
          tar xzf build/vsg-cache.tar.gz -C build/spec_cache
          echo "Primed VSG cache from $PREV:"
          find build/spec_cache/vsg -maxdepth 2 -type f | head -20
          echo "  ($(find build/spec_cache/vsg -type f | wc -l) files total)"

      - name: Prime compiler Task 1 cache from previous release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            echo "No previous release — starting with an empty compiler cache."
            exit 0
          fi
          gh release download "$PREV" --pattern compiler-task1-cache.json --dir build 2>/dev/null || {
            echo "Previous release has no compiler Task 1 cache — starting empty."
            exit 0
          }
          echo "Primed compiler Task 1 cache from $PREV."

      - name: Prime content-identical compiler artifacts from previous release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p build/compiler_reuse
          PREV=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            echo "No previous release — compiler artifacts will be rebuilt."
            exit 0
          fi
          for ASSET in manifest.json knowledge_db_ast.tar.gz knowledge_db_compiler.tar.gz; do
            gh release download "$PREV" --pattern "$ASSET" --dir build/compiler_reuse 2>/dev/null || {
              echo "Previous release lacks $ASSET — compiler artifacts will be rebuilt."
              exit 0
            }
          done
          tar xzf build/compiler_reuse/knowledge_db_ast.tar.gz -C build
          tar xzf build/compiler_reuse/knowledge_db_compiler.tar.gz -C build
          echo "Restored prior compiler artifacts for content-identity validation."

      - name: Build knowledge database
        run: >
          uv run --no-sync python scripts/build_knowledge_db.py
          --output-dir build
          --compiler-reuse-manifest build/compiler_reuse/manifest.json
          --tar

      - name: Re-tar VSG cache for next run
        if: always()
        run: |
          if [ -d build/spec_cache/vsg ] && [ -n "$(ls -A build/spec_cache/vsg 2>/dev/null)" ]; then
            tar czf build/vsg-cache.tar.gz -C build/spec_cache vsg
            echo "Packed VSG cache: $(stat -c%s build/vsg-cache.tar.gz) bytes"
          else
            echo "No VSG cache to pack."
          fi

      - name: Tar Central spec cache for test fixtures
        if: always()
        run: |
          # Published as a release artifact so test suites (and agents in
          # local dev) can hydrate the real Central OpenAPI specs without
          # re-scraping ReadMe.io.  See scripts/hydrate_test_fixtures.sh.
          #
          # The tarball is ALWAYS created so the release-upload step never
          # references a missing file.  An empty tarball is valid; the
          # hydration script handles the zero-spec case gracefully.
          mkdir -p build/spec_cache/central
          tar czf build/central-spec-cache.tar.gz -C build/spec_cache central
          COUNT=$(find build/spec_cache/central -name '*.json' | wc -l)
          echo "Packed Central spec cache: ${COUNT} spec files, $(stat -c%s build/central-spec-cache.tar.gz) bytes"

      - name: Ensure alert label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotently create the label used by the alert step below.
          # `gh label create` exits non-zero if the label already exists, so
          # we tolerate that and only fail on other errors.
          gh label create knowledge-sync-alert \
            --description "Auto-opened when the daily knowledge sync is degraded" \
            --color B60205 2>/tmp/label.err || {
            if grep -qiE "already exists|already in use" /tmp/label.err; then
              echo "Label already exists — continuing."
            else
              cat /tmp/label.err >&2
              exit 1
            fi
          }

      - name: Check sync health
        id: health
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_EP=$(jq -r '.endpoint_count // 0' build/manifest.json)
          echo "new_ep=$NEW_EP" >> "$GITHUB_OUTPUT"

          # A provider is "bad" if it ended in error.  "degraded" is allowed
          # because it still publishes useful data (e.g. partial coverage,
          # WAF block on optional VSG docs).
          BAD=$(jq -r '[.sync_health // {} | to_entries[] | select(.value.status == "error")] | length' build/manifest.json)
          DEGRADED=$(jq -r '[.sync_health // {} | to_entries[] | select(.value.status == "degraded")] | length' build/manifest.json)
          DEGRADED_NAMES=$(jq -r '[.sync_health // {} | to_entries[] | select(.value.status == "degraded") | .key] | join(", ")' build/manifest.json)
          echo "Providers in error: $BAD; degraded: $DEGRADED ($DEGRADED_NAMES)"

          PREV=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            echo "No previous release — skipping coverage comparison."
            if [ "$BAD" -gt 0 ]; then
              echo "healthy=false" >> "$GITHUB_OUTPUT"
              echo "reason=${BAD} provider(s) errored (see sync_health in manifest)" >> "$GITHUB_OUTPUT"
            else
              echo "healthy=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          gh release download "$PREV" --pattern manifest.json --dir /tmp/prev 2>/dev/null || {
            echo "Could not download previous manifest — skipping comparison."
            if [ "$BAD" -gt 0 ]; then
              echo "healthy=false" >> "$GITHUB_OUTPUT"
              echo "reason=${BAD} provider(s) errored (see sync_health in manifest)" >> "$GITHUB_OUTPUT"
            else
              echo "healthy=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          }

          OLD_EP=$(jq -r '.endpoint_count // 0' /tmp/prev/manifest.json)
          echo "Previous: ${OLD_EP} endpoints, Current: ${NEW_EP} endpoints"

          # Flag unhealthy if >25% drop OR any provider fully errored
          if [ "$BAD" -gt 0 ]; then
            echo "⚠ Provider error detected"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            echo "reason=${BAD} provider(s) errored (see sync_health in manifest)" >> "$GITHUB_OUTPUT"
          elif [ "$OLD_EP" -gt 0 ] && [ "$NEW_EP" -lt $(( OLD_EP * 75 / 100 )) ]; then
            echo "⚠ Significant endpoint drop detected (${OLD_EP} → ${NEW_EP})"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            echo "reason=Endpoint count dropped from ${OLD_EP} to ${NEW_EP} (>25% loss)" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open knowledge-sync alert issue (if unhealthy)
        if: steps.health.outputs.healthy == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list --label knowledge-sync-alert --state open --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Open alert issue #${EXISTING} already exists — adding comment."
            gh issue comment "$EXISTING" --body "Knowledge sync health check failed again on $(date -u +%Y-%m-%dT%H:%M:%SZ).

          **Reason:** ${{ steps.health.outputs.reason }}
          **Endpoint count:** ${{ steps.health.outputs.new_ep }}

          See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          else
            gh issue create \
              --title "Knowledge sync degraded: ${{ steps.health.outputs.reason }}" \
              --label knowledge-sync-alert \
              --body "The daily knowledge DB build detected a sync health issue.

          **Reason:** ${{ steps.health.outputs.reason }}
          **Endpoint count:** ${{ steps.health.outputs.new_ep }}
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          This issue was auto-created. It will be auto-closed when a healthy build succeeds.

          Check \`build/manifest.json\` → \`sync_health\` for per-provider details."
          fi

      - name: Auto-close knowledge-sync alert issues (if healthy)
        if: steps.health.outputs.healthy == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --label knowledge-sync-alert --state open --json number -q '.[].number' 2>/dev/null | while read -r NUM; do
            if [ -n "$NUM" ]; then
              gh issue close "$NUM" --comment "Knowledge sync health restored — auto-closing. Endpoint count: ${{ steps.health.outputs.new_ep }}"
              echo "Closed issue #${NUM}"
            fi
          done

      - name: Check for changes against latest release
        id: diff
        if: steps.health.outputs.healthy == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            echo "No previous release found — publishing."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh release download "$PREV" --pattern manifest.json --dir /tmp/prev 2>/dev/null || {
            echo "Could not download previous manifest — publishing."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          }

          OLD_EP=$(jq -r '.endpoint_count // 0' /tmp/prev/manifest.json)
          NEW_EP=$(jq -r '.endpoint_count // 0' build/manifest.json)
          OLD_CAT=$(jq -r '.category_count // 0' /tmp/prev/manifest.json)
          NEW_CAT=$(jq -r '.category_count // 0' build/manifest.json)
          OLD_DOC=$(jq -r '.doc_count // 0' /tmp/prev/manifest.json)
          NEW_DOC=$(jq -r '.doc_count // 0' build/manifest.json)
          OLD_CATS=$(jq -r '.categories | sort | join(",")' /tmp/prev/manifest.json)
          NEW_CATS=$(jq -r '.categories | sort | join(",")' build/manifest.json)
          OLD_COMPILER_ID=$(jq -r '.ast.artifact_cache.identity // ""' /tmp/prev/manifest.json)
          NEW_COMPILER_ID=$(jq -r '.ast.artifact_cache.identity // ""' build/manifest.json)
          NEW_EXTERNAL_REFS=$(jq -r '.ast.artifact_cache.external_ref_count // 0' build/manifest.json)
          OLD_COMPILER=$(jq -c '.compiler_projection // null' /tmp/prev/manifest.json)
          NEW_COMPILER=$(jq -c '.compiler_projection // null' build/manifest.json)
          OLD_PARITY=$(jq -c '.projection_parity // null' /tmp/prev/manifest.json)
          NEW_PARITY=$(jq -c '.projection_parity // null' build/manifest.json)

          echo "Previous: ${OLD_EP} endpoints, ${OLD_CAT} categories, ${OLD_DOC} docs"
          echo "Current:  ${NEW_EP} endpoints, ${NEW_CAT} categories, ${NEW_DOC} docs"
          echo "Previous compiler artifact identity: ${OLD_COMPILER_ID}"
          echo "Current compiler artifact identity:  ${NEW_COMPILER_ID}"
          echo "Current external compiler references: ${NEW_EXTERNAL_REFS}"
          echo "Previous compiler projection: ${OLD_COMPILER}"
          echo "Current compiler projection:  ${NEW_COMPILER}"
          echo "Previous projection parity: ${OLD_PARITY}"
          echo "Current projection parity:  ${NEW_PARITY}"

          if [ "$NEW_EXTERNAL_REFS" = "0" ] && [ "$OLD_EP" = "$NEW_EP" ] && [ "$OLD_CAT" = "$NEW_CAT" ] && [ "$OLD_CATS" = "$NEW_CATS" ] && [ "$OLD_DOC" = "$NEW_DOC" ] && [ "$OLD_COMPILER_ID" = "$NEW_COMPILER_ID" ] && [ "$OLD_COMPILER" = "$NEW_COMPILER" ] && [ "$OLD_PARITY" = "$NEW_PARITY" ]; then
            echo "No changes detected — skipping release."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected — publishing new release."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release tag
        if: steps.health.outputs.healthy == 'true' && steps.diff.outputs.changed == 'true'
        id: tag
        run: echo "tag=knowledge-db-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.health.outputs.healthy == 'true' && steps.diff.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Knowledge DB ${{ steps.tag.outputs.tag }}"
          body: |
            Auto-generated knowledge database snapshot.
            Contains the API endpoints, VSG documentation sections, and seed scripts the MCP server uses for offline lookups.
          files: |
            build/knowledge_db.tar.gz
            build/knowledge_db_compiler.tar.gz
            build/knowledge_db_ast.tar.gz
            build/manifest.json
            build/vsg-cache.tar.gz
            build/central-spec-cache.tar.gz
            build/compiler-task1-cache.json
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
