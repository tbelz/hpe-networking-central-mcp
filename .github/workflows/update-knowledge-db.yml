name: Update Knowledge Database

on:
  schedule:
    - cron: "0 4 * * *"   # Daily at 04:00 UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write          # Needed for creating releases
  issues: write            # Needed for knowledge-sync alert issues

jobs:
  build-knowledge-db:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Build knowledge database
        run: python scripts/build_knowledge_db.py --output-dir build --tar

      - name: Ensure alert label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotently create the label used by the alert step below.
          # `gh label create` exits non-zero if the label already exists, so
          # we tolerate that and only fail on other errors.
          gh label create knowledge-sync-alert \
            --description "Auto-opened when the daily knowledge sync is degraded" \
            --color B60205 2>/tmp/label.err || {
            if grep -qiE "already exists|already in use" /tmp/label.err; then
              echo "Label already exists — continuing."
            else
              cat /tmp/label.err >&2
              exit 1
            fi
          }

      - name: Check sync health
        id: health
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW_EP=$(jq -r '.endpoint_count // 0' build/manifest.json)
          echo "new_ep=$NEW_EP" >> "$GITHUB_OUTPUT"

          # A provider is "bad" if it ended in error.  "degraded" is allowed
          # because it still publishes useful data (e.g. partial coverage,
          # WAF block on optional VSG docs).
          BAD=$(jq -r '[.sync_health // {} | to_entries[] | select(.value.status == "error")] | length' build/manifest.json)
          DEGRADED=$(jq -r '[.sync_health // {} | to_entries[] | select(.value.status == "degraded")] | length' build/manifest.json)
          DEGRADED_NAMES=$(jq -r '[.sync_health // {} | to_entries[] | select(.value.status == "degraded") | .key] | join(", ")' build/manifest.json)
          echo "Providers in error: $BAD; degraded: $DEGRADED ($DEGRADED_NAMES)"

          PREV=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            echo "No previous release — skipping coverage comparison."
            if [ "$BAD" -gt 0 ]; then
              echo "healthy=false" >> "$GITHUB_OUTPUT"
              echo "reason=${BAD} provider(s) errored (see sync_health in manifest)" >> "$GITHUB_OUTPUT"
            else
              echo "healthy=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          gh release download "$PREV" --pattern manifest.json --dir /tmp/prev 2>/dev/null || {
            echo "Could not download previous manifest — skipping comparison."
            if [ "$BAD" -gt 0 ]; then
              echo "healthy=false" >> "$GITHUB_OUTPUT"
              echo "reason=${BAD} provider(s) errored (see sync_health in manifest)" >> "$GITHUB_OUTPUT"
            else
              echo "healthy=true" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          }

          OLD_EP=$(jq -r '.endpoint_count // 0' /tmp/prev/manifest.json)
          echo "Previous: ${OLD_EP} endpoints, Current: ${NEW_EP} endpoints"

          # Flag unhealthy if >25% drop OR any provider fully errored
          if [ "$BAD" -gt 0 ]; then
            echo "⚠ Provider error detected"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            echo "reason=${BAD} provider(s) errored (see sync_health in manifest)" >> "$GITHUB_OUTPUT"
          elif [ "$OLD_EP" -gt 0 ] && [ "$NEW_EP" -lt $(( OLD_EP * 75 / 100 )) ]; then
            echo "⚠ Significant endpoint drop detected (${OLD_EP} → ${NEW_EP})"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
            echo "reason=Endpoint count dropped from ${OLD_EP} to ${NEW_EP} (>25% loss)" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open knowledge-sync alert issue (if unhealthy)
        if: steps.health.outputs.healthy == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list --label knowledge-sync-alert --state open --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Open alert issue #${EXISTING} already exists — adding comment."
            gh issue comment "$EXISTING" --body "Knowledge sync health check failed again on $(date -u +%Y-%m-%dT%H:%M:%SZ).

          **Reason:** ${{ steps.health.outputs.reason }}
          **Endpoint count:** ${{ steps.health.outputs.new_ep }}

          See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          else
            gh issue create \
              --title "Knowledge sync degraded: ${{ steps.health.outputs.reason }}" \
              --label knowledge-sync-alert \
              --body "The daily knowledge DB build detected a sync health issue.

          **Reason:** ${{ steps.health.outputs.reason }}
          **Endpoint count:** ${{ steps.health.outputs.new_ep }}
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          This issue was auto-created. It will be auto-closed when a healthy build succeeds.

          Check \`build/manifest.json\` → \`sync_health\` for per-provider details."
          fi

      - name: Auto-close knowledge-sync alert issues (if healthy)
        if: steps.health.outputs.healthy == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --label knowledge-sync-alert --state open --json number -q '.[].number' 2>/dev/null | while read -r NUM; do
            if [ -n "$NUM" ]; then
              gh issue close "$NUM" --comment "Knowledge sync health restored — auto-closing. Endpoint count: ${{ steps.health.outputs.new_ep }}"
              echo "Closed issue #${NUM}"
            fi
          done

      - name: Check for changes against latest release
        id: diff
        if: steps.health.outputs.healthy == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || true)
          if [ -z "$PREV" ]; then
            echo "No previous release found — publishing."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh release download "$PREV" --pattern manifest.json --dir /tmp/prev 2>/dev/null || {
            echo "Could not download previous manifest — publishing."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          }

          OLD_EP=$(jq -r '.endpoint_count // 0' /tmp/prev/manifest.json)
          NEW_EP=$(jq -r '.endpoint_count // 0' build/manifest.json)
          OLD_CAT=$(jq -r '.category_count // 0' /tmp/prev/manifest.json)
          NEW_CAT=$(jq -r '.category_count // 0' build/manifest.json)
          OLD_DOC=$(jq -r '.doc_count // 0' /tmp/prev/manifest.json)
          NEW_DOC=$(jq -r '.doc_count // 0' build/manifest.json)
          OLD_CATS=$(jq -r '.categories | sort | join(",")' /tmp/prev/manifest.json)
          NEW_CATS=$(jq -r '.categories | sort | join(",")' build/manifest.json)

          echo "Previous: ${OLD_EP} endpoints, ${OLD_CAT} categories, ${OLD_DOC} docs"
          echo "Current:  ${NEW_EP} endpoints, ${NEW_CAT} categories, ${NEW_DOC} docs"

          if [ "$OLD_EP" = "$NEW_EP" ] && [ "$OLD_CAT" = "$NEW_CAT" ] && [ "$OLD_CATS" = "$NEW_CATS" ] && [ "$OLD_DOC" = "$NEW_DOC" ]; then
            echo "No changes detected — skipping release."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected — publishing new release."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release tag
        if: steps.health.outputs.healthy == 'true' && steps.diff.outputs.changed == 'true'
        id: tag
        run: echo "tag=knowledge-db-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.health.outputs.healthy == 'true' && steps.diff.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Knowledge DB ${{ steps.tag.outputs.tag }}"
          body: |
            Auto-generated knowledge database snapshot.
            Contains the API endpoints, VSG documentation sections, and seed scripts the MCP server uses for offline lookups.
          files: |
            build/knowledge_db.tar.gz
            build/manifest.json
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
