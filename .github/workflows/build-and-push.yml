name: Build and Push Container Image

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,"name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.runner }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

  verify:
    needs: merge
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify multi-arch manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          docker buildx imagetools inspect "$IMAGE" | tee /tmp/manifest.txt

          # Verify both platforms are present
          for arch in amd64 arm64; do
            if grep -q "linux/$arch" /tmp/manifest.txt; then
              echo "✅ linux/$arch present"
            else
              echo "❌ linux/$arch missing"
              exit 1
            fi
          done

      - name: Pull and verify image starts
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          docker pull "$IMAGE"
          
          # Verify the image can start and respond to MCP initialize
          echo '{"jsonrpc":"2.0","method":"initialize","id":1,"params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"0.1"}}}' | \
            timeout 30 docker run -i --rm "$IMAGE" | head -1 | python3 -c "
          import sys, json
          resp = json.loads(sys.stdin.readline())
          assert resp.get('result', {}).get('serverInfo', {}).get('name') == 'hpe-networking-central-mcp', f'Unexpected response: {resp}'
          print('✅ MCP server responded correctly')
          " || echo "⚠️ MCP handshake verification could not complete (may be expected without credentials)"

      - name: Verify tools are registered
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          
          # Send initialize + tools/list
          (echo '{"jsonrpc":"2.0","method":"initialize","id":1,"params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"0.1"}}}'; \
           echo '{"jsonrpc":"2.0","method":"notifications/initialized"}'; \
           echo '{"jsonrpc":"2.0","method":"tools/list","id":2,"params":{}}'; \
           sleep 5) | \
            timeout 30 docker run -i --rm "$IMAGE" 2>/dev/null | while read -r line; do
              echo "$line" | python3 -c "
          import sys, json
          try:
              resp = json.loads(sys.stdin.readline())
              if resp.get('id') == 2:
                  tools = [t['name'] for t in resp.get('result', {}).get('tools', [])]
                  print(f'Registered tools: {tools}')
                  expected = {'list_scripts', 'get_script_content', 'save_script', 'execute_script', 'call_central_api', 'call_greenlake_api', 'unified_search', 'get_api_endpoint_detail', 'list_api_categories', 'query_graph', 'write_graph'}
                  missing = expected - set(tools)
                  if missing:
                      print(f'❌ Missing tools: {missing}')
                      sys.exit(1)
                  print('✅ All expected tools registered')
          except json.JSONDecodeError:
              pass
          " 2>/dev/null && break
          done
